# Main configuration for SigGate-GT
# Override with: python train.py --config-name=experiment/zinc
# or: python train.py model.hidden_dim=128 seed=1

defaults:
  - _self_
  - model: zinc
  - data: zinc
  - training: default

# ─────────────────────────────────────────────────────────────────────────────
# Global settings
# ─────────────────────────────────────────────────────────────────────────────
task: zinc                    # zinc | molhiv | molpcba | peptides_func | peptides_struct
seed: 0                       # Paper uses seeds 0, 1, 2, 3, 4
deterministic: true           # Set false for faster training (non-deterministic)

# ─────────────────────────────────────────────────────────────────────────────
# Experiment tracking (Weights & Biases)
# ─────────────────────────────────────────────────────────────────────────────
wandb:
  enabled: false
  project: "siggate-gt"
  entity: null                # Your W&B username or team

# ─────────────────────────────────────────────────────────────────────────────
# Hydra output directory
# ─────────────────────────────────────────────────────────────────────────────
hydra:
  run:
    dir: outputs/${task}/seed${seed}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
