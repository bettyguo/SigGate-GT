# Default training configuration (ZINC settings)
# @package training

epochs: 2000
eval_every_n_epochs: 1
save_every_n_epochs: 50
max_checkpoints: 3
max_grad_norm: 1.0
resume: null

optimizer:
  name: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-5
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  name: cosine
  eta_min: 1.0e-6
