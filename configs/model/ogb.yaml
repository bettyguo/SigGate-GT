# Model configuration for OGB molecular benchmarks
# (ogbg-molhiv, ogbg-molpcba)
# 5 layers, dim 256, 8 heads

# @package model
hidden_dim: 256
num_layers: 5
num_heads: 8
ffn_multiplier: 2
dropout: 0.1
attn_dropout: 0.0
gate_bias_init: 0.5
readout: "mean"
# out_dim set per-task (1 for molhiv, 128 for molpcba)
