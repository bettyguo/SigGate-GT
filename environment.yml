# Conda Environment for SigGate-GT
# Create:   conda env create -f environment.yml
# Activate: conda activate siggate_gt

name: siggate_gt
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11.7
  - cuda-toolkit=12.1
  - cudnn=8.9.7
  - pytorch=2.1.0
  - torchvision
  - pytorch-cuda=12.1

  # Scientific computing
  - numpy=1.26.3
  - scipy=1.11.4
  - pandas=2.1.4
  - scikit-learn=1.3.2
  - matplotlib=3.8.2
  - seaborn=0.13.1

  # Development
  - pip>=23.3
  - ipython>=8.19
  - ipdb

  - pip:
    - torch-geometric==2.4.0
    - torch-scatter==2.1.2
    - torch-sparse==0.6.18
    - ogb==1.3.6
    - hydra-core>=1.3.2
    - omegaconf>=2.3.0
    - wandb>=0.16.0
    - tqdm>=4.66.0
    - rich>=13.7.0
    - pydantic>=2.5.0
    - python-dotenv>=1.0.0
    - pytest>=7.4.0
    - pytest-cov>=4.1.0
    - ruff>=0.1.9
    - mypy>=1.8.0
    - -e .
